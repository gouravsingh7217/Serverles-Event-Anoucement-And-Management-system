<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventPulse — My Events</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;--accent:#ff4d6d;--accent2:#7c3aed;--accent3:#00d9ff;--text:#e8e8f0;--muted:#6b6b88;--success:#00e676;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;}
  .orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);z-index:0;animation:orbF 10s ease-in-out infinite;}
  .orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,217,255,0.08) 0%,transparent 70%);top:-200px;right:-150px;animation-delay:-2s;}
  .orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,0.1) 0%,transparent 70%);bottom:-100px;left:-100px;animation-delay:-5s;}
  @keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,20px)}}
  .grid-lines{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(42,42,58,0.18) 1px,transparent 1px),linear-gradient(90deg,rgba(42,42,58,0.18) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 100% 70% at 50% 50%,black 10%,transparent 100%);}

  /* NAV */
  .topnav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:66px;background:rgba(18,18,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,0.25);}
  .topnav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,217,255,0.3),rgba(124,58,237,0.3),transparent);}
  .nav-brand{font-family:var(--font-display);font-size:30px;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:filter 0.3s;}
  .nav-brand:hover{filter:drop-shadow(0 0 12px rgba(255,77,109,0.4));}
  .nav-right{display:flex;align-items:center;gap:14px;}
  .nav-user{font-size:13px;color:var(--muted);font-family:var(--font-mono);}
  .nav-role-badge{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:rgba(0,217,255,0.1);color:var(--accent3);border:1px solid rgba(0,217,255,0.25);}
  .btn-logout{padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.25s;font-family:var(--font-body);}
  .btn-logout:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,77,109,0.06);transform:translateY(-1px);}

  /* BODY */
  .dash-body{padding:32px;max-width:1200px;margin:0 auto;position:relative;z-index:1;}

  /* WELCOME */
  .user-welcome{background:rgba(18,18,26,0.8);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:18px;padding:26px 30px;margin-bottom:30px;display:flex;align-items:center;gap:18px;animation:welcomeIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both;position:relative;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;}
  @keyframes welcomeIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
  .user-welcome::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent3),var(--accent2),transparent);}
  .user-welcome:hover{border-color:rgba(0,217,255,0.2);box-shadow:0 10px 40px rgba(0,0,0,0.3);}
  .user-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent3));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:26px;color:#fff;flex-shrink:0;box-shadow:0 0 0 3px rgba(0,217,255,0.15);animation:avatarGlow 3s ease-in-out infinite;}
  @keyframes avatarGlow{0%,100%{box-shadow:0 0 0 3px rgba(0,217,255,0.15)}50%{box-shadow:0 0 0 6px rgba(0,217,255,0.25),0 0 20px rgba(124,58,237,0.2)}}
  .user-welcome-text h3{font-family:var(--font-display);font-size:24px;letter-spacing:1px;}
  .user-welcome-text p{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5;}

  /* SEARCH */
  .search-wrap{margin-bottom:26px;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.2s both;position:relative;}
  .search-input{width:100%;padding:13px 20px 13px 44px;background:rgba(18,18,26,0.7);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);backdrop-filter:blur(10px);}
  .search-input:hover{border-color:rgba(0,217,255,0.3);}
  .search-input:focus{border-color:var(--accent3);box-shadow:0 0 0 3px rgba(0,217,255,0.1),0 4px 20px rgba(0,0,0,0.2);}
  .search-input::placeholder{color:var(--muted);}
  .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;opacity:0.5;}

  /* TABS */
  .dash-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:28px;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.25s both;}
  .dash-tab{padding:13px 26px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:-1px;transition:all 0.25s;letter-spacing:0.5px;position:relative;}
  .dash-tab.active{border-bottom-color:var(--accent3);color:var(--text);}
  .dash-tab:hover{color:var(--text);}
  .tab-count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(0,217,255,0.15);color:var(--accent3);font-size:10px;font-weight:700;margin-left:7px;vertical-align:middle;transition:all 0.3s;}
  .dash-tab.active .tab-count{background:rgba(0,217,255,0.25);}
  .tab-panel{display:none;animation:panelIn 0.4s cubic-bezier(0.16,1,0.3,1);}
  .tab-panel.active{display:block;}
  @keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* EVENTS GRID */
  .events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
  .event-card{background:rgba(18,18,26,0.8);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;cursor:default;}
  @keyframes cardIn{from{opacity:0;transform:translateY(22px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .event-card:hover{transform:translateY(-7px);border-color:rgba(124,58,237,0.4);box-shadow:0 22px 55px rgba(0,0,0,0.4),0 0 0 1px rgba(124,58,237,0.1);}
  .event-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent3));opacity:0;transition:opacity 0.3s;}
  .event-card:hover::before{opacity:1;}
  .event-card::after{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.06) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.3s;}
  .event-card:hover::after{opacity:1;}
  .event-type-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
  .type-upcoming{background:rgba(0,230,118,0.1);color:var(--success);border:1px solid rgba(0,230,118,0.22);}
  .type-past{background:rgba(107,107,136,0.12);color:var(--muted);border:1px solid var(--border);}
  .event-title{font-family:var(--font-display);font-size:24px;letter-spacing:1px;margin-bottom:8px;line-height:1.2;}
  .event-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:16px;}
  .event-meta{display:flex;flex-wrap:wrap;gap:10px;font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .event-meta span{display:flex;align-items:center;gap:5px;transition:color 0.2s;}
  .event-card:hover .event-meta span{color:rgba(232,232,240,0.7);}
  .days-badge{position:absolute;top:18px;right:18px;background:rgba(0,217,255,0.1);border:1px solid rgba(0,217,255,0.2);border-radius:10px;padding:5px 10px;font-family:var(--font-mono);font-size:11px;color:var(--accent3);}
  .days-badge.past-badge{background:rgba(107,107,136,0.1);border-color:var(--border);color:var(--muted);}

  /* SECTION TITLE */
  .section-title{font-family:var(--font-display);font-size:34px;letter-spacing:2px;margin-bottom:22px;color:var(--text);}
  .section-title span{color:var(--accent3);}

  /* EMPTY */
  .empty-state{text-align:center;padding:70px 20px;color:var(--muted);animation:fadeUp 0.5s ease;}
  .empty-state .icon{font-size:52px;margin-bottom:14px;}
  .empty-state p{font-size:14px;}

  /* TOAST */
  .toast{position:fixed;bottom:32px;right:32px;background:var(--card);border:1px solid var(--success);border-radius:14px;padding:14px 22px;font-size:13px;color:var(--success);box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:1000;display:none;animation:toastIn 0.4s cubic-bezier(0.16,1,0.3,1);}
  @keyframes toastIn{from{transform:translateX(60px) translateY(10px);opacity:0}to{transform:translateX(0) translateY(0);opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  @media(max-width:600px){.dash-body{padding:16px}.topnav{padding:0 16px}}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="grid-lines"></div>

<nav class="topnav">
  <div class="nav-brand">EventPulse</div>
  <div class="nav-right">
    <span class="nav-user"      id="nav-user-email"></span>
    <span class="nav-role-badge">Viewer</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dash-body">
  <div class="user-welcome">
    <div class="user-avatar" id="user-avatar">U</div>
    <div class="user-welcome-text">
      <h3 id="welcome-name">Welcome!</h3>
      <p>Browse upcoming and past events. Announcements are sent to your registered email via AWS SNS.</p>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Search events by title, venue, or category..." oninput="handleSearch()"/>
  </div>

  <div class="dash-tabs">
    <button class="dash-tab active" onclick="switchTab(this,'upcoming')">🗓 Upcoming Events <span class="tab-count" id="count-upcoming">0</span></button>
    <button class="dash-tab"        onclick="switchTab(this,'past')">    📂 Past Events     <span class="tab-count" id="count-past">0</span></button>
  </div>

  <div class="tab-panel active" id="panel-upcoming">
    <div class="section-title">Upcoming <span>Events</span></div>
    <div class="events-grid" id="grid-upcoming"></div>
  </div>
  <div class="tab-panel" id="panel-past">
    <div class="section-title">Past <span>Events</span></div>
    <div class="events-grid" id="grid-past"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ──
  const API_URL      = "https://mk9b1wx63j.execute-api.ap-south-1.amazonaws.com/prod";
  const USE_REAL_API = true;

  // ── Auth guard ──
  const sessionUser = sessionStorage.getItem('ep_user');
  if (!sessionUser) { window.location.href = 'login.html'; }
  const user = JSON.parse(sessionUser || '{}');
  if (user.role === 'admin') { window.location.href = 'admin.html'; }

  document.getElementById('nav-user-email').textContent = user.email || '';
  document.getElementById('welcome-name').textContent   = `Welcome back, ${(user.name||'User').split(' ')[0]}!`;
  document.getElementById('user-avatar').textContent    = (user.name||'U')[0].toUpperCase();

  // ── Events data ──
  // When USE_REAL_API = true, fetches from API Gateway → Lambda → RDS
  let events = { upcoming: [], past: [] };

  async function loadEvents() {
    if (USE_REAL_API) {
      try {
        const [up, past] = await Promise.all([
          fetch(`${API_URL}/events?type=upcoming`).then(r => r.json()),
          fetch(`${API_URL}/events?type=past`).then(r => r.json()),
        ]);
        events.upcoming = up.events   || [];
        events.past     = past.events || [];
      } catch(e) {
        console.warn('API failed, using localStorage:', e);
        loadFromStorage();
      }
    } else {
      loadFromStorage();
    }
    updateCounts();
    renderGrid('grid-upcoming', events.upcoming, 'upcoming');
    renderGrid('grid-past',     events.past,     'past');
  }

  function loadFromStorage() {
    const stored = JSON.parse(localStorage.getItem('ep_events') || 'null');
    events = stored || {
      upcoming: [
        {id:1,title:'Tech Summit 2025',   desc:'Annual technology conference featuring keynotes, workshops, and networking sessions.',        date:'2025-08-15',venue:'Main Auditorium',  category:'Technology'},
        {id:2,title:'Design Hackathon',   desc:'A 48-hour design sprint to solve real-world UX challenges with top designers.',              date:'2025-09-02',venue:'Innovation Hub',   category:'Design'},
        {id:3,title:'AI Workshop Series', desc:'Hands-on workshops exploring practical applications of artificial intelligence.',            date:'2025-09-20',venue:'Lab Block B',       category:'AI/ML'},
      ],
      past: [
        {id:4,title:'Product Launch 2024',desc:'Unveiling of our flagship product to stakeholders and press.',                              date:'2024-11-10',venue:'Conference Hall 1', category:'Product'},
        {id:5,title:'Annual Gala',         desc:'An evening of celebration, awards, and networking for our community.',                       date:'2024-12-20',venue:'Grand Ballroom',    category:'Social'},
      ]
    };
  }

  let searchQuery = '';

  function getDaysUntil(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const ev    = new Date(dateStr + 'T00:00:00');
    return Math.round((ev - today) / (1000*60*60*24));
  }

  function renderGrid(containerId, list, type) {
    const el = document.getElementById(containerId);
    const filtered = searchQuery
      ? list.filter(ev =>
          ev.title.toLowerCase().includes(searchQuery) ||
          ev.venue.toLowerCase().includes(searchQuery) ||
          (ev.category||'').toLowerCase().includes(searchQuery) ||
          ev.desc.toLowerCase().includes(searchQuery))
      : list;

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">${searchQuery?'🔎':'📭'}</div><p>${searchQuery?'No events match your search.':`No ${type} events at the moment.`}</p></div>`;
      return;
    }

    el.innerHTML = filtered.map((ev, i) => {
      const days = getDaysUntil(ev.date);
      let badge = '';
      if (type === 'upcoming') {
        badge = days === 0
          ? `<div class="days-badge">Today!</div>`
          : days > 0
            ? `<div class="days-badge">in ${days}d</div>`
            : `<div class="days-badge past-badge">${Math.abs(days)}d ago</div>`;
      }
      return `
        <div class="event-card" style="animation-delay:${i*0.08}s">
          ${badge}
          <span class="event-type-badge type-${type}">${type==='upcoming'?'🗓 Upcoming':'📂 Past'}</span>
          <div class="event-title">${highlight(ev.title)}</div>
          <div class="event-desc">${highlight(ev.desc)}</div>
          <div class="event-meta">
            <span>📅 ${formatDate(ev.date)}</span>
            <span>📍 ${highlight(ev.venue)}</span>
            ${ev.category?`<span>🏷 ${highlight(ev.category)}</span>`:''}
          </div>
        </div>`;
    }).join('');
  }

  function highlight(text) {
    if (!searchQuery) return text;
    return text.replace(new RegExp(`(${escReg(searchQuery)})`, 'gi'),
      '<mark style="background:rgba(0,217,255,0.25);color:var(--accent3);border-radius:3px;padding:0 2px">$1</mark>');
  }
  function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
  }

  function handleSearch() {
    searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
    renderGrid('grid-upcoming', events.upcoming, 'upcoming');
    renderGrid('grid-past',     events.past,     'past');
  }

  function switchTab(btn, panel) {
    document.querySelectorAll('.dash-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${panel}`).classList.add('active');
  }

  function updateCounts() {
    document.getElementById('count-upcoming').textContent = events.upcoming.length;
    document.getElementById('count-past').textContent     = events.past.length;
  }

  function logout() {
    sessionStorage.removeItem('ep_user');
    sessionStorage.removeItem('ep_token');
    window.location.href = 'login.html';
  }

  // Init
  loadEvents();
</script>
</body>
</html>
